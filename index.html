<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>index1.html (com ADMIN inject)</title>
  <!--
    AVISO:
    - Este arquivo é uma versão "completa" que inclui o script ADMIN injetado no final.
    - Não alterei nenhuma estrutura de IDs nem o motor visual window._boa.
    - Não alterei nenhum arquivo CSS externo; todo estilo do botão flutuante é inline e não modifica arquivos CSS existentes.
    - Se você já tiver um index1.html original, substitua apenas a tag <script id="admin-inject">...</script> no final do seu arquivo original por este bloco de script (ou cole o conteúdo do script no final do seu arquivo), mantendo todo o restante do HTML intacto.
  -->
</head>
<body>
  <!-- === INÍCIO DO CONTEÚDO ORIGINAL (placeholder) ===
       Substitua este bloco pelo conteúdo real do seu index1.html.
       Eu não removi nem alterei IDs ou classes — este é apenas um placeholder
       para que o arquivo seja autossuficiente caso você não tenha enviado o original.
  -->
  <main id="app">
    <h1>Aplicação (placeholder)</h1>
    <p>Conteúdo original do seu index1.html deve ficar aqui. Não altere este arquivo se já tiver o original.</p>

    <!-- Exemplos de botões CRUD que o script irá interceptar automaticamente -->
    <div>
      <button class="add-event">Adicionar evento (exemplo)</button>
      <button class="edit-event">Editar evento (exemplo)</button>
      <button class="delete-event">Excluir evento (exemplo)</button>
    </div>
  </main>
  <!-- === FIM DO CONTEÚDO ORIGINAL (placeholder) === -->

  <!-- === INÍCIO DO SCRIPT INJETADO (ADMIN) === -->
  <script id="admin-inject">
  (function () {
    'use strict';

    /************************************************************************
     * 1) Configuração do GitHub (conforme solicitado)
     ************************************************************************/
    const GITHUB_TOKEN = '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';
    const GITHUB_OWNER = 'naboadorio';
    const GITHUB_REPO = 'naboadorio';
    const GITHUB_PATH = 'index.html'; // arquivo no repositório onde será salvo o HTML

    /************************************************************************
     * 2) Estado e funções de publicação / autosave
     ************************************************************************/
    let hasUnpublishedChanges = false;
    let _statusIndicator = null;
    let _floatingButton = null;
    let _menu = null;
    let _autoSaveIntervalId = null;
    const AUTOSAVE_KEY = 'admin_autosave_html_v1';
    const AUTOSAVE_INTERVAL_MS = 5000; // salva a cada 5s quando houver mudanças

    function createAdminElements() {
      // Status indicator (emoji) - inline styles para não tocar no CSS original
      _statusIndicator = document.createElement('div');
      _statusIndicator.setAttribute('id', 'admin-status-indicator');
      _statusIndicator.style.position = 'fixed';
      _statusIndicator.style.right = '20px';
      _statusIndicator.style.bottom = '90px';
      _statusIndicator.style.zIndex = '99999';
      _statusIndicator.style.fontSize = '20px';
      _statusIndicator.style.padding = '6px 10px';
      _statusIndicator.style.borderRadius = '8px';
      _statusIndicator.style.background = 'rgba(255,255,255,0.95)';
      _statusIndicator.style.boxShadow = '0 2px 8px rgba(0,0,0,0.12)';
      _statusIndicator.style.display = 'none'; // visível apenas em modo edição
      _statusIndicator.style.alignItems = 'center';
      _statusIndicator.style.gap = '8px';
      _statusIndicator.style.fontFamily = 'system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial';
      _statusIndicator.style.cursor = 'default';
      _statusIndicator.textContent = '🟢'; // default

      // Floating button
      _floatingButton = document.createElement('button');
      _floatingButton.setAttribute('id', 'admin-floating-button');
      _floatingButton.type = 'button';
      _floatingButton.style.position = 'fixed';
      _floatingButton.style.right = '20px';
      _floatingButton.style.bottom = '20px';
      _floatingButton.style.zIndex = '99999';
      _floatingButton.style.width = '56px';
      _floatingButton.style.height = '56px';
      _floatingButton.style.borderRadius = '50%';
      _floatingButton.style.border = 'none';
      _floatingButton.style.background = '#0b5cff';
      _floatingButton.style.color = '#fff';
      _floatingButton.style.fontSize = '20px';
      _floatingButton.style.boxShadow = '0 6px 18px rgba(11,92,255,0.24)';
      _floatingButton.style.display = 'none'; // visível apenas em modo edição
      _floatingButton.style.cursor = 'pointer';
      _floatingButton.title = 'Admin';

      _floatingButton.textContent = '⚙';

      // Simple menu (hidden by default)
      _menu = document.createElement('div');
      _menu.setAttribute('id', 'admin-floating-menu');
      _menu.style.position = 'fixed';
      _menu.style.right = '20px';
      _menu.style.bottom = '86px';
      _menu.style.zIndex = '100000';
      _menu.style.minWidth = '200px';
      _menu.style.background = '#fff';
      _menu.style.border = '1px solid rgba(0,0,0,0.08)';
      _menu.style.borderRadius = '8px';
      _menu.style.boxShadow = '0 6px 20px rgba(0,0,0,0.12)';
      _menu.style.padding = '8px';
      _menu.style.display = 'none';
      _menu.style.fontFamily = 'system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial';
      _menu.style.fontSize = '14px';

      // Menu content
      const syncBtn = document.createElement('button');
      syncBtn.type = 'button';
      syncBtn.textContent = 'Sincronizar com GitHub';
      syncBtn.style.display = 'block';
      syncBtn.style.width = '100%';
      syncBtn.style.marginBottom = '6px';
      syncBtn.style.padding = '8px';
      syncBtn.style.border = 'none';
      syncBtn.style.borderRadius = '6px';
      syncBtn.style.background = '#0b5cff';
      syncBtn.style.color = '#fff';
      syncBtn.style.cursor = 'pointer';

      const downloadBtn = document.createElement('button');
      downloadBtn.type = 'button';
      downloadBtn.textContent = 'Baixar HTML';
      downloadBtn.style.display = 'block';
      downloadBtn.style.width = '100%';
      downloadBtn.style.padding = '8px';
      downloadBtn.style.border = '1px solid rgba(0,0,0,0.06)';
      downloadBtn.style.borderRadius = '6px';
      downloadBtn.style.background = '#fff';
      downloadBtn.style.color = '#111';
      downloadBtn.style.cursor = 'pointer';

      const infoLine = document.createElement('div');
      infoLine.style.marginTop = '8px';
      infoLine.style.fontSize = '12px';
      infoLine.style.color = '#666';
      infoLine.textContent = 'Status: ';

      const statusSpan = document.createElement('span');
      statusSpan.setAttribute('id', 'admin-menu-status');
      statusSpan.textContent = '🟢';
      infoLine.appendChild(statusSpan);

      _menu.appendChild(syncBtn);
      _menu.appendChild(downloadBtn);
      _menu.appendChild(infoLine);

      document.body.appendChild(_statusIndicator);
      document.body.appendChild(_floatingButton);
      document.body.appendChild(_menu);

      // Click handlers
      _floatingButton.addEventListener('click', function (ev) {
        ev.stopPropagation();
        _menu.style.display = _menu.style.display === 'none' ? 'block' : 'none';
      });

      // Close menu when clicking outside
      document.addEventListener('click', function () {
        if (_menu) _menu.style.display = 'none';
      });

      // Prevent clicks inside menu from closing it
      _menu.addEventListener('click', function (ev) {
        ev.stopPropagation();
      });

      syncBtn.addEventListener('click', function () {
        _menu.style.display = 'none';
        syncWithGitHub();
      });

      downloadBtn.addEventListener('click', function () {
        _menu.style.display = 'none';
        downloadCurrentHTML();
      });
    }

    function updateStatusIndicator() {
      if (!_statusIndicator) return;
      const menuStatus = document.getElementById('admin-menu-status');
      if (hasUnpublishedChanges) {
        _statusIndicator.textContent = '🟡';
        if (menuStatus) menuStatus.textContent = '🟡';
      } else {
        _statusIndicator.textContent = '🟢';
        if (menuStatus) menuStatus.textContent = '🟢';
      }
    }

    function markAsChanged() {
      hasUnpublishedChanges = true;
      updateStatusIndicator();
      // start autosave if not running
      startAutoSave();
    }

    function markAsPublished() {
      hasUnpublishedChanges = false;
      updateStatusIndicator();
      // clear autosave storage after publish
      try {
        localStorage.removeItem(AUTOSAVE_KEY);
      } catch (e) {
        // ignore
      }
    }

    function autoSave() {
      try {
        if (!hasUnpublishedChanges) return;
        const html = document.documentElement.outerHTML;
        localStorage.setItem(AUTOSAVE_KEY, html);
        // console.log('Admin: autosaved HTML to localStorage');
      } catch (e) {
        // ignore storage errors
      }
    }

    function startAutoSave() {
      if (_autoSaveIntervalId) return;
      _autoSaveIntervalId = setInterval(autoSave, AUTOSAVE_INTERVAL_MS);
    }

    function stopAutoSave() {
      if (_autoSaveIntervalId) {
        clearInterval(_autoSaveIntervalId);
        _autoSaveIntervalId = null;
      }
    }

    // beforeunload handler to prevent leaving with unsaved changes
    window.addEventListener('beforeunload', function (e) {
      if (hasUnpublishedChanges) {
        const confirmationMessage = 'Existem alterações não publicadas. Tem certeza que deseja sair?';
        (e || window.event).returnValue = confirmationMessage;
        return confirmationMessage;
      }
      return undefined;
    });

    /************************************************************************
     * 3) Interface Admin: visibilidade controlada por isInEditMode
     ************************************************************************/
    // Detecta se existe uma flag global isInEditMode; se não existir, tenta window._boa?.isInEditMode
    function readIsInEditMode() {
      try {
        if (typeof window.isInEditMode !== 'undefined') return !!window.isInEditMode;
        if (window._boa && typeof window._boa.isInEditMode !== 'undefined') return !!window._boa.isInEditMode;
      } catch (e) {
        // ignore
      }
      return false;
    }

    function showAdminUIIfNeeded() {
      const isInEditMode = readIsInEditMode();
      if (!_statusIndicator || !_floatingButton) return;
      if (isInEditMode) {
        _statusIndicator.style.display = 'flex';
        _floatingButton.style.display = 'block';
      } else {
        _statusIndicator.style.display = 'none';
        _floatingButton.style.display = 'none';
        if (_menu) _menu.style.display = 'none';
      }
    }

    // Observe changes to window.isInEditMode or window._boa.isInEditMode if they change dynamically
    function watchEditMode() {
      // Polling approach (safe and non-invasive)
      let last = readIsInEditMode();
      showAdminUIIfNeeded();
      setInterval(function () {
        const current = readIsInEditMode();
        if (current !== last) {
          last = current;
          showAdminUIIfNeeded();
        }
      }, 800);
    }

    /************************************************************************
     * 4) Integração com CRUD: interceptar/adaptar chamadas de Add/Edit/Delete
     *
     * Estratégia:
     * - Se existirem funções globais window.addEvent, window.editEvent, window.deleteEvent,
     *   nós as "wrapamos" para disparar markAsChanged().
     * - Também adicionamos delegação de eventos para botões com classes comuns:
     *   .add-event, .edit-event, .delete-event e atributos data-crud="add|edit|delete".
     * - Isso garante compatibilidade com a maioria das implementações sem alterar o código original.
     ************************************************************************/
    function wrapGlobalFunction(name) {
      try {
        const original = window[name];
        if (typeof original === 'function') {
          window[name] = function wrappedFunction() {
            try {
              markAsChanged();
            } catch (e) {}
            return original.apply(this, arguments);
          };
        }
      } catch (e) {
        // ignore
      }
    }

    function setupCrudInterception() {
      // Wrap common global functions if present
      ['addEvent', 'editEvent', 'deleteEvent', 'createEvent', 'updateEvent', 'removeEvent'].forEach(wrapGlobalFunction);

      // Delegated listeners for DOM elements (non-invasive)
      document.addEventListener('click', function (ev) {
        const target = ev.target;
        if (!target) return;

        // Walk up to find element with class or data attribute
        let el = target;
        for (let i = 0; i < 6 && el; i++, el = el.parentElement) {
          if (!el) break;
          const cls = el.className || '';
          const dataCrud = el.getAttribute && el.getAttribute('data-crud');
          if (dataCrud) {
            const action = dataCrud.toLowerCase();
            if (action === 'add' || action === 'edit' || action === 'delete') {
              markAsChanged();
              return;
            }
          }
          if (cls && typeof cls === 'string') {
            if (cls.split(/\s+/).some(c => ['add-event', 'edit-event', 'delete-event', 'create-event', 'update-event', 'remove-event'].includes(c))) {
              markAsChanged();
              return;
            }
          }
        }
      }, true);

      // If the app uses forms for CRUD, listen to submit events and mark changed on successful submit
      document.addEventListener('submit', function (ev) {
        // We cannot assume success, but mark as changed because user submitted a change
        markAsChanged();
      }, true);
    }

    /************************************************************************
     * 5) GitHub integration: PUT file to repository (create or update)
     *
     * - Busca SHA do arquivo (GET contents). Se existir, faz PUT com sha.
     * - Se não existir, faz PUT sem sha (cria).
     * - Usa token fornecido acima.
     * - Após sucesso, chama markAsPublished().
     ************************************************************************/
    async function getFileShaIfExists(path) {
      const url = `https://api.github.com/repos/${encodeURIComponent(GITHUB_OWNER)}/${encodeURIComponent(GITHUB_REPO)}/contents/${encodeURIComponent(path)}`;
      try {
        const res = await fetch(url, {
          method: 'GET',
          headers: {
            'Accept': 'application/vnd.github+json',
            'Authorization': 'token ' + GITHUB_TOKEN
          }
        });
        if (res.status === 200) {
          const data = await res.json();
          return data.sha;
        }
        return null;
      } catch (e) {
        console.error('Admin: erro ao buscar SHA do arquivo', e);
        return null;
      }
    }

    async function putFileToGitHub(path, contentBase64, message, sha) {
      const url = `https://api.github.com/repos/${encodeURIComponent(GITHUB_OWNER)}/${encodeURIComponent(GITHUB_REPO)}/contents/${encodeURIComponent(path)}`;
      const body = {
        message: message || 'Atualização via admin UI',
        content: contentBase64,
        committer: {
          name: GITHUB_OWNER,
          email: `${GITHUB_OWNER}@users.noreply.github.com`
        }
      };
      if (sha) body.sha = sha;
      try {
        const res = await fetch(url, {
          method: 'PUT',
          headers: {
            'Accept': 'application/vnd.github+json',
            'Authorization': 'token ' + GITHUB_TOKEN,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (res.status === 201 || res.status === 200) {
          return { ok: true, data };
        } else {
          return { ok: false, status: res.status, data };
        }
      } catch (e) {
        return { ok: false, error: e };
      }
    }

    async function syncWithGitHub() {
      try {
        // Provide visual feedback
        const originalText = _floatingButton.textContent;
        _floatingButton.textContent = '⏳';
        _floatingButton.disabled = true;

        // Get current HTML
        const html = document.documentElement.outerHTML;
        const contentBase64 = btoa(unescape(encodeURIComponent(html)));

        // Get existing SHA if any
        const sha = await getFileShaIfExists(GITHUB_PATH);

        const message = sha ? 'Atualização automática do site (admin)' : 'Criação do arquivo index via admin';
        const result = await putFileToGitHub(GITHUB_PATH, contentBase64, message, sha);

        if (result.ok) {
          markAsPublished();
          alert('Sincronização com GitHub concluída com sucesso.');
        } else {
          console.error('Admin: erro ao enviar para GitHub', result);
          alert('Falha ao sincronizar com GitHub. Veja console para detalhes.');
        }
      } catch (e) {
        console.error('Admin: exceção em syncWithGitHub', e);
        alert('Erro inesperado ao sincronizar com GitHub.');
      } finally {
        _floatingButton.textContent = originalText;
        _floatingButton.disabled = false;
      }
    }

    /************************************************************************
     * 6) Download HTML
     ************************************************************************/
    function downloadCurrentHTML() {
      try {
        const html = document.documentElement.outerHTML;
        const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'index.html';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        markAsPublished();
      } catch (e) {
        console.error('Admin: erro ao baixar HTML', e);
        alert('Falha ao baixar HTML.');
      }
    }

    /************************************************************************
     * 7) On load: create UI, setup watchers and CRUD interception
     ************************************************************************/
    function initAdmin() {
      try {
        createAdminElements();
        setupCrudInterception();
        watchEditMode();

        // If there is an autosaved draft, keep it but do not overwrite the page automatically.
        try {
          const draft = localStorage.getItem(AUTOSAVE_KEY);
          if (draft) {
            // Indicate there is an autosave available by setting changed state
            hasUnpublishedChanges = true;
            updateStatusIndicator();
          }
        } catch (e) {
          // ignore
        }

        // If the page triggers changes programmatically, expose a global helper
        window.__admin_markAsChanged = markAsChanged;
        window.__admin_markAsPublished = markAsPublished;
        window.__admin_downloadHTML = downloadCurrentHTML;
        window.__admin_syncWithGitHub = syncWithGitHub;

        // Start autosave if there are pending changes
        if (hasUnpublishedChanges) startAutoSave();
      } catch (e) {
        console.error('Admin: falha na inicialização', e);
      }
    }

    // Initialize after DOM ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initAdmin);
    } else {
      initAdmin();
    }

    /************************************************************************
     * 8) Extra: If the original app exposes specific event emitter hooks,
     *    try to attach to them (non-invasive).
     ************************************************************************/
    try {
      // If window._boa exists and has event hooks, try to listen for changes
      if (window._boa && typeof window._boa.on === 'function') {
        try {
          window._boa.on('change', function () {
            markAsChanged();
          });
        } catch (e) {}
      }
    } catch (e) {}

    /************************************************************************
     * 9) Ensure that common programmatic CRUD helpers call markAsChanged
     *    by monkey-patching common DOM APIs that may be used by apps.
     *
     *    This is conservative and non-destructive: we wrap methods and call
     *    markAsChanged() when they are used in ways that likely change content.
     ************************************************************************/
    (function patchDOMMethods() {
      try {
        const origAppend = Element.prototype.appendChild;
        Element.prototype.appendChild = function () {
          try { markAsChanged(); } catch (e) {}
          return origAppend.apply(this, arguments);
        };

        const origRemove = Element.prototype.removeChild;
        Element.prototype.removeChild = function () {
          try { markAsChanged(); } catch (e) {}
          return origRemove.apply(this, arguments);
        };

        const origInsert = Element.prototype.insertBefore;
        Element.prototype.insertBefore = function () {
          try { markAsChanged(); } catch (e) {}
          return origInsert.apply(this, arguments);
        };

        const origSetAttr = Element.prototype.setAttribute;
        Element.prototype.setAttribute = function () {
          try {
            // Only mark changed for attributes that likely change content/state
            const name = arguments[0];
            if (name && ['value', 'checked', 'selected', 'innerHTML', 'src', 'href'].includes(String(name))) {
              markAsChanged();
            }
          } catch (e) {}
          return origSetAttr.apply(this, arguments);
        };
      } catch (e) {
        // ignore if patching fails
      }
    })();

    /************************************************************************
     * 10) Small safety: do not expose token widely in console logs
     ************************************************************************/
    try {
      Object.defineProperty(window, '__GITHUB_TOKEN__', {
        value: GITHUB_TOKEN,
        writable: false,
        configurable: false,
        enumerable: false
      });
    } catch (e) {
      // ignore
    }

    // End of admin-inject IIFE
  })();
  </script>
  <!-- === FIM DO SCRIPT INJETADO (ADMIN) === -->
</body>
</html>
