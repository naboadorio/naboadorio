<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ingressos com Desconto BOA</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root{--primary:#FF2A6D;--secondary:#fee822;--bg-light:#f5f5f5;--text-dark:#1a1a1a;--text-gray:#777;--border-gray:#e0e0e0;--white:#fff}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Nunito',sans-serif;background:var(--bg-light);color:var(--text-dark);line-height:1.6}
    a{color:inherit;text-decoration:none}
    .container{max-width:480px;margin:0 auto;background:var(--white);min-height:100vh;display:flex;flex-direction:column}
    
    /* Header e Sticky */
    .sticky-wrapper{position:sticky;top:0;z-index:1000;background:#fff;}
    .header{background:#fff;padding:12px;display:flex;align-items:center;gap:10px;border-bottom:4px solid var(--secondary);}
    .logo img{height:70px;width:auto;display:block;}
    .search-wrapper{flex:1;position:relative;}
    .search-wrapper input{width:100%;padding:10px 14px 10px 36px;border:2px solid #e0e0e0;border-radius:20px;font-size:13px;}
    .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#999;}

    /* Filtros */
    .filter-section{background:#fff;padding:14px 12px;display:flex;gap:8px;overflow-x:auto;border-bottom:1px solid var(--border-gray);}
    .filter-btn{background:#fff;color:var(--primary);border:2px solid var(--primary);border-radius:20px;padding:8px 16px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;}
    .filter-btn.active{background:var(--primary);color:#fff;}

    /* Grid de Eventos - Responsividade */
    .section-header{padding:18px 16px;font-size:18px;font-weight:800;display:flex;align-items:center;gap:8px}
    .events-grid{padding:0 12px 24px;display:flex;flex-direction:column;gap:16px}
    
    @media(min-width:768px){
      .container{max-width:1000px;}
      .events-grid{display:grid;grid-template-columns:repeat(2, 1fr);gap:20px;padding:20px;}
    }
    @media(min-width:1024px){
      .events-grid{grid-template-columns:repeat(3, 1fr);}
    }

    /* Cards */
    .event-card{background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 4px 12px rgba(0,0,0,.12);border:1px solid rgba(255,42,109,.08);display:flex;flex-direction:column;}
    .event-image-wrapper{position:relative;width:100%;aspect-ratio:16/9;background:#f0f0f0;overflow:hidden;}
    .event-image-fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:10px;background:linear-gradient(135deg,#FFE0EA,#FFF0C2);}
    .fallback-title{font-weight:900;font-size:16px;color:#9c1f45;}
    
    .date-badge{position:absolute;top:12px;left:12px;background:var(--primary);color:#fff;padding:8px;border-radius:10px;font-weight:800;text-align:center;font-size:12px;line-height:1;}
    .discount-badge{position:absolute;top:12px;right:12px;background:var(--primary);color:#fff;padding:6px 12px;border-radius:18px;font-weight:800;font-size:12px;}
    .promo-badge{position:absolute;bottom:10px;left:10px;background:rgba(255,255,255,0.95);color:var(--primary);padding:6px 12px;border-radius:15px;font-weight:700;font-size:11px;box-shadow:0 2px 5px rgba(0,0,0,0.1);}

    .event-content{padding:15px;flex-grow:1;display:flex;flex-direction:column;}
    .artist-title{font-size:16px;font-weight:900;margin-bottom:2px;}
    .event-subtitle{font-size:12px;color:var(--text-gray);margin-bottom:10px;font-weight:700;}
    .event-location{font-size:13px;color:var(--text-gray);margin-bottom:15px;display:flex;gap:5px;}
    .event-location i{color:var(--primary);}

    .event-actions{display:flex;gap:8px;margin-top:auto;}
    .btn-ticket{flex:4;background:linear-gradient(135deg,var(--primary),#ff0066);color:#fff;padding:12px;border-radius:12px;text-align:center;font-weight:700;font-size:13px;}
    .btn-share{flex:1;background:#f0f0f0;color:var(--text-dark);padding:12px;border-radius:12px;text-align:center;cursor:pointer;}

    /* Footer e FAB */
    footer{background:#fff;padding:30px 16px;text-align:center;border-top:2px solid var(--secondary);margin-top:20px;}
    .footer-buttons{display:flex;flex-direction:column;gap:10px;margin-top:15px;}
    .footer-btn{padding:14px;border-radius:10px;color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;gap:10px;}
    .btn-whatsapp{background:#25D366;}
    .btn-instagram{background:#E1306C;}
    .fab-whatsapp{position:fixed;bottom:20px;right:16px;z-index:999;background:#25D366;color:#fff;padding:12px 20px;border-radius:50px;font-weight:800;box-shadow:0 4px 15px rgba(0,0,0,0.2);display:flex;align-items:center;gap:8px;}

    /* Admin UI */
    .image-upload-panel{background:#fff;padding:15px;border:2px dashed var(--primary);margin:15px;border-radius:12px;display:none;}
    #publishStatus{position:fixed;bottom:85px;right:16px;background:#fff;padding:8px 15px;border-radius:20px;font-weight:800;font-size:12px;box-shadow:0 4px 10px rgba(0,0,0,0.1);z-index:1001;display:none;}
    #publishFloatingBtn{position:fixed;bottom:25px;right:16px;background:var(--primary);color:#fff;border:none;padding:15px 25px;border-radius:50px;font-weight:800;z-index:1001;cursor:pointer;display:none;box-shadow:0 5px 15px rgba(255,42,109,0.3);}
  </style>
</head>

          <input type="text" id="newDisc" placeholder="Desconto" style="width:100%;padding:8px;margin-bottom:10px;">
          <button onclick="saveEvent()" style="width:100%;background:#25D366;color:#fff;padding:10px;border:none;border-radius:5px;font-weight:700;">Salvar Evento</button>
        </div>
      </div>
    </div>

    <div class="section-header"><i class="far fa-calendar-alt"></i><span>Próximos Eventos</span></div>
